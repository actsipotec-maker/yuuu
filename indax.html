<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Home IoT Panel</title>
    
    <!-- นำเข้าฟอนต์ Mitr จาก Google Fonts เพื่อความสวยงาม -->
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        /* =========================================
           ส่วนที่ 1: การตกแต่ง CSS (UI Design)
           ========================================= */
        body {
            background-color: #0d1117; /* สีพื้นหลังหลักแบบเข้ม */
            color: #ffffff;
            font-family: 'Mitr', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .panel-container {
            background-color: #161b22; /* สีพื้นหลังของการ์ด */
            border-radius: 20px;
            padding: 30px;
            width: 350px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8), inset 0 0 10px rgba(0, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 255, 0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #00FFFF; /* สีฟ้า Neon */
            font-size: 26px;
            margin: 0;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(0, 255, 255, 0.6); /* เอฟเฟกต์เรืองแสง */
        }

        .header p {
            color: #8b949e;
            font-size: 14px;
            margin: 5px 0 0 0;
        }

        .switch-row {
            background-color: #21262d;
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .switch-label {
            font-size: 16px;
            font-weight: 400;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* การออกแบบ Toggle Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 54px;
            height: 28px;
        }

        .switch input { 
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #484f58;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        /* เมื่อสวิตช์ถูกเปิด (ON) */
        input:checked + .slider {
            background-color: #00FFFF;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            font-size: 12px;
            color: #58a6ff;
            opacity: 0.8;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <!-- =========================================
         ส่วนที่ 2: โครงสร้าง HTML (UI Layout)
         ========================================= -->
    <div class="panel-container">
        <div class="header">
            <h1>SMART HOME</h1>
            <p>ESP8266 IoT Control Panel</p>
        </div>

        <!-- ช่องที่ 1 -->
        <div class="switch-row">
            <span class="switch-label">💡 ช่องที่ 1 (D1)</span>
            <label class="switch">
                <!-- onchange จะเรียกฟังก์ชันอัปเดตข้อมูลเมื่อมีการกด -->
                <input type="checkbox" id="CH1" onchange="updateDevice('CH1', this.checked)">
                <span class="slider"></span>
            </label>
        </div>

        <!-- ช่องที่ 2 -->
        <div class="switch-row">
            <span class="switch-label">🔌 ช่องที่ 2 (D2)</span>
            <label class="switch">
                <input type="checkbox" id="CH2" onchange="updateDevice('CH2', this.checked)">
                <span class="slider"></span>
            </label>
        </div>

        <!-- ช่องที่ 3 -->
        <div class="switch-row">
            <span class="switch-label">📺 ช่องที่ 3 (D5)</span>
            <label class="switch">
                <input type="checkbox" id="CH3" onchange="updateDevice('CH3', this.checked)">
                <span class="slider"></span>
            </label>
        </div>

        <!-- ช่องที่ 4 -->
        <div class="switch-row">
            <span class="switch-label">❄️ ช่องที่ 4 (D6)</span>
            <label class="switch">
                <input type="checkbox" id="CH4" onchange="updateDevice('CH4', this.checked)">
                <span class="slider"></span>
            </label>
        </div>

        <div class="footer">
            ผู้พัฒนาระบบ<br>
            ครูวิทยากร วรรณา<br>
            แผนกอิเล็กทรอนิกส์<br>
            วิทยาลัยสารพัดช่างศรีสะเกษ
        </div>
    </div>

    <!-- =========================================
         ส่วนที่ 3: JavaScript และ Firebase 
         ========================================= -->
    <!-- นำเข้า Firebase SDK v8 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // --- ส่วนที่ต้องแก้ไข: ใส่ข้อมูล Firebase ของคุณ ---
        // คุณสามารถหาข้อมูลเหล่านี้ได้ที่เมนู Project Settings ใน Firebase Console
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com", // สำคัญมาก! ต้องมี
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // เริ่มต้นการทำงานของ Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // กำหนดตำแหน่ง (Path) ในฐานข้อมูลที่จะเก็บสถานะสวิตช์
        // ในที่นี้เราจะเก็บไว้ในโฟลเดอร์ชื่อ 'SmartHome/Devices'
        const devicesRef = database.ref('SmartHome/Devices');

        // ฟังก์ชันสำหรับส่งคำสั่งไปที่ Firebase เมื่อผู้ใช้คลิกสวิตช์
        function updateDevice(channelName, isChecked) {
            devicesRef.child(channelName).set(isChecked)
                .then(() => {
                    console.log(`อัปเดต ${channelName} เป็น ${isChecked} สำเร็จ`);
                })
                .catch((error) => {
                    console.error("เกิดข้อผิดพลาดในการอัปเดต:", error);
                    // หากอัปเดตไม่สำเร็จ ให้ดีดสวิตช์กลับไปค่าเดิม (ถ้าต้องการ)
                });
        }

        // ฟังก์ชันสำหรับรับค่าจาก Firebase มาแสดงผล (Real-time Sync)
        devicesRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                // เช็คว่ามีข้อมูลของแต่ละช่องไหม ถ้ามีให้ปรับสวิตช์บนเว็บให้ตรงกัน
                if(data.CH1 !== undefined) document.getElementById('CH1').checked = data.CH1;
                if(data.CH2 !== undefined) document.getElementById('CH2').checked = data.CH2;
                if(data.CH3 !== undefined) document.getElementById('CH3').checked = data.CH3;
                if(data.CH4 !== undefined) document.getElementById('CH4').checked = data.CH4;
            }
        });
    </script>
</body>
</html>
